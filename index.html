<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SY · 作品集</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #faf8f5;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #2c2a28;
            line-height: 1.5;
            padding: 2rem 1.5rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* 顶部导航 */
        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 3rem;
            border-bottom: 1px solid #e8e2d9;
            margin-bottom: 3rem;
        }

        .logo {
            font-size: 1.2rem;
            font-weight: 400;
            letter-spacing: 1.5px;
            color: #8b6f4c;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            font-size: 0.9rem;
        }

        .nav-links a {
            text-decoration: none;
            color: #5a534a;
            transition: color 0.2s ease;
            letter-spacing: 0.3px;
        }

        .nav-links a:hover {
            color: #8b6f4c;
        }

        /* 简介区 */
        .hero {
            margin-bottom: 4rem;
            max-width: 700px;
        }

        .hero h1 {
            font-size: 2.2rem;
            font-weight: 300;
            color: #2c2a28;
            line-height: 1.2;
            margin-bottom: 0.8rem;
        }

        .hero p {
            font-size: 1rem;
            color: #6b6359;
            max-width: 480px;
        }

        .hero .tag {
            display: inline-block;
            margin-top: 1.2rem;
            padding: 0.4rem 1.2rem;
            background: #eae5de;
            border-radius: 30px;
            font-size: 0.75rem;
            letter-spacing: 0.5px;
            color: #4a443e;
        }

        /* 项目卡片网格 */
        .projects {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 2rem;
            margin-bottom: 4rem;
        }

        .project-card {
            background: #ffffff;
            padding: 2rem 1.8rem 1.8rem;
            border-radius: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            border: 1px solid #f0ebe5;
        }

        .project-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.04);
        }

        .project-card .number {
            font-size: 0.75rem;
            color: #b5aa9b;
            letter-spacing: 1px;
            margin-bottom: 1rem;
            display: block;
        }

        .project-card h3 {
            font-size: 1.2rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: #2c2a28;
        }

        .project-card p {
            font-size: 0.9rem;
            color: #6b6359;
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }

        .project-card .tech {
            font-size: 0.7rem;
            color: #8f8478;
            letter-spacing: 0.3px;
            margin-bottom: 1.2rem;
        }

        .project-card a {
            text-decoration: none;
            color: #8b6f4c;
            font-size: 0.9rem;
            font-weight: 400;
            border-bottom: 1px solid #dcd5cc;
            padding-bottom: 2px;
            transition: border-color 0.2s ease;
        }

        .project-card a:hover {
            border-color: #8b6f4c;
        }

        /* 底部 */
        .footer {
            border-top: 1px solid #e8e2d9;
            padding-top: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            font-size: 0.8rem;
            color: #8f8478;
        }

        .footer a {
            color: #8b6f4c;
            text-decoration: none;
            margin-left: 1.5rem;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        /* 响应式 */
        @media (max-width: 640px) {
            body {
                padding: 1.5rem 1rem;
            }

            .nav {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.8rem;
                padding-bottom: 2rem;
                margin-bottom: 2.5rem;
            }

            .nav-links {
                gap: 1.2rem;
                font-size: 0.85rem;
            }
